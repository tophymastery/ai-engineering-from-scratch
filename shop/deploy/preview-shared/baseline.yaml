# Shared multi-tenant preview BASELINE (D29 / S-T2).
#
# ONE long-lived baseline stack serves every open PR. A PR does NOT get its own
# full stack; it deploys only its CHANGED services (see pr-preview-template.yaml)
# and routes to them by the X-Preview-Tenant: pr-<n> header, falling back to
# this baseline for everything it did not change.
#
# Economics (D29): the baseline is amortized across all PRs; per-PR marginal
# cost is only the changed pods. scale-to-zero + TTL cap idle spend.
apiVersion: v1
kind: Namespace
metadata:
  name: preview-shared
  labels:
    env-name: preview
    preview-role: baseline
  annotations:
    preview.shop.io/scale-to-zero-idle: "2h"   # idle baseline scales to zero after 2h
    preview.shop.io/ttl: "7d"                   # namespace reaped after 7 days
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: baseline-gateway
  namespace: preview-shared
  labels:
    app: gateway
    preview-role: baseline
  annotations:
    preview.shop.io/scale-to-zero-idle: "2h"
    preview.shop.io/ttl: "7d"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
      preview-role: baseline
  template:
    metadata:
      labels:
        app: gateway
        preview-role: baseline
    spec:
      containers:
        - name: gateway
          image: shop/gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: GATEWAY_MODE
              value: "preview"                  # NOT prod: previews may use testhooks
            - name: PLACEHOLDER_URL
              value: "http://baseline-placeholder:8081"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: baseline-placeholder
  namespace: preview-shared
  labels:
    app: placeholder
    preview-role: baseline
  annotations:
    preview.shop.io/scale-to-zero-idle: "2h"
    preview.shop.io/ttl: "7d"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: placeholder
      preview-role: baseline
  template:
    metadata:
      labels:
        app: placeholder
        preview-role: baseline
    spec:
      containers:
        - name: placeholder
          image: shop/placeholder:latest
          ports:
            - containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: baseline-placeholder
  namespace: preview-shared
spec:
  selector:
    app: placeholder
    preview-role: baseline
  ports:
    - port: 8081
      targetPort: 8081
