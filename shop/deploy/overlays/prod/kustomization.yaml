# prod overlay: promotion target (04 §1.3), canary-rolled. Highest redundancy.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namePrefix: prod-

resources:
  - ../../base

labels:
  - pairs:
      env-name: prod
    includeSelectors: false

replicas:
  - name: gateway
    count: 3
  - name: placeholder
    count: 3

# V-T1/D4: keep edge JWT verification OFF in prod until the identity slice is
# rolled out cell-by-cell (flip to "true" per cell during rollout). Strategic
# merge on the container+env name overrides the base default.
patches:
  - target:
      kind: Deployment
      name: gateway
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: gateway
      spec:
        template:
          spec:
            containers:
              - name: gateway
                env:
                  - name: FLAG_AUTH_JWT_EDGE
                    value: "false"
