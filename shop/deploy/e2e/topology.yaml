# deploy/e2e/topology.yaml — the SINGLE SOURCE manifest for the shared E2E env
# (S-T8). Every service in the 01 §1 catalog + all 4 BFFs + the 3 S-T7 fakes,
# each as one slot with a stable port. tools/e2e-up.sh boots exactly this set (in
# process mode); the gateway fans out one prefix per slot.
#
# mode per slot (today):
#   stub  — booted by tools/stubgen from `contract` (the neighbour isn't built yet)
#   fake  — a built S-T7 fake binary (.run/<name>); used where a catalog service
#           delegates to a provider sim (payment PSP side, maps, notify sink)
#   real  — booted from `real_cmd` (the merged slice binary). No slice binaries
#           exist in this repo yet, so every catalog slot ships mode: stub with an
#           empty real_cmd. The stub->real swap is driven at RUNTIME from a small
#           overlay (.run/e2e-overlay.yaml) written by tools/e2e-swap.sh /
#           `make e2e-sync` — never by editing this manifest. e2e-up re-reads
#           manifest+overlay on every invocation (the "automatic from manifests"
#           hook; in production a GitOps watcher does this on merge).
#
# real_cmd contract: a shell command launched with PORT, CONTRACT and SERVICE_NAME
# in the environment, so a plain binary path (reads PORT) or a wrapper both work.
version: 1
gateway:
  name: gateway
  port: 8080
services:
  # --- 12-service catalog (01 §1) ---
  # identity is the FIRST real slice (V-T1): real_cmd boots the built identity-auth
  # binary (tools/identity-realcmd.sh). `make e2e-sync` promotes it stub->real.
  - { name: identity,          port: 8101, mode: stub, contract: contracts/openapi/identity.v1.yaml,          real_cmd: "bash tools/identity-realcmd.sh" }
  # merchant-catalog is the V-T3 slice: real_cmd boots the built binary
  # (tools/merchant-catalog-realcmd.sh, catalog_v1 on). `make e2e-sync` promotes
  # it stub->real once the binary builds.
  - { name: merchant-catalog,  port: 8102, mode: stub, contract: contracts/openapi/merchant-catalog.v1.yaml,  real_cmd: "bash tools/merchant-catalog-realcmd.sh" }
  # search is the V-T4 slice: real_cmd boots the built search-query binary
  # (tools/search-realcmd.sh, search_v2 on; embeds the indexer). `make e2e-sync`
  # promotes it stub->real once the binary builds.
  - { name: search,            port: 8103, mode: stub, contract: contracts/openapi/search.v1.yaml,            real_cmd: "bash tools/search-realcmd.sh" }
  # ranking is the V-T5 slice (D17 two-phase): real_cmd boots the built ranking
  # binary (tools/ranking-realcmd.sh, ranking_ml on; retrieves top-500 from the
  # search slot via SEARCH_URL, re-ranks to top-50). The gateway routes the browse
  # BFF endpoint (/customer-bff/v1/customer/home) here. `make e2e-sync` promotes it
  # stub->real once the binary builds.
  - { name: ranking,           port: 8115, mode: stub, contract: contracts/openapi/ranking.v1.yaml,           real_cmd: "bash tools/ranking-realcmd.sh" }
  # feed-cache is the V-T6 slice (D11/D17): real_cmd boots the built feed-cache
  # binary (tools/feed-cache-realcmd.sh, feed_cache on). It FRONTS the browse feed
  # (its ORIGIN_FEED_URL points at the ranking slot -> geo-tile SWR cache) and the
  # customer merchant page (ORIGIN_MERCHANT_URL -> merchant-catalog, two-tier
  # singleflight/Redis cache). The gateway routes /customer-bff/v1/customer/home +
  # /v1/customer/merchants/* here. `make e2e-sync` promotes it stub->real.
  - { name: feed-cache,        port: 8116, mode: stub, contract: contracts/openapi/feed-cache.v1.yaml,        real_cmd: "bash tools/feed-cache-realcmd.sh" }
  # cart is the V-T7 slice: real_cmd boots the built cart binary
  # (tools/cart-realcmd.sh, cart_v1 on; CATALOG_URL->merchant-catalog slot for the
  # add-time item-validation read; consumes menu.updated via /v1/menu-events).
  # `make e2e-sync` promotes it stub->real once the binary builds.
  - { name: cart,              port: 8104, mode: stub, contract: contracts/openapi/cart.v1.yaml,              real_cmd: "bash tools/cart-realcmd.sh" }
  # order is the V-T9 slice (D22/D9): real_cmd boots the built binary
  # (tools/order-realcmd.sh, saga_v1 on; PAYMENT_URL->payment-sim for the
  # authorize/capture/void saga steps). `make e2e-sync` promotes it stub->real
  # once the binary builds. The gateway routes /customer-bff/v1/orders* here
  # (checkout/get/cancel passthrough) and /order/v1/* directly.
  - { name: order,             port: 8105, mode: stub, contract: contracts/openapi/order.v1.yaml,             real_cmd: "bash tools/order-realcmd.sh" }
  - { name: payment,           port: 8106, mode: stub, contract: contracts/openapi/payment.v1.yaml,           real_cmd: "bash tools/payment-realcmd.sh" }
  # merchant-queue is the V-T11 slice (D7 CQRS read model + admission tokens, D11
  # sharding by merchant_id): real_cmd boots the built binary
  # (tools/merchant-queue-realcmd.sh, merchant_queue_v1 on; ORDER_URL->order slot
  # so an admitted accept drives the saga). `make e2e-sync` promotes it stub->real
  # once the binary builds. The gateway routes /merchant-queue/v1/* directly.
  - { name: merchant-queue,    port: 8117, mode: stub, contract: contracts/openapi/merchant-queue.v1.yaml,    real_cmd: "bash tools/merchant-queue-realcmd.sh" }
  # pricing-promo is the V-T8 slice (D10): real_cmd boots the built binary
  # (tools/pricing-realcmd.sh, pricing_v1 on; CART_URL->cart slot for the
  # subtotal read, the pricing-promo->cart pact). `make e2e-sync` promotes it
  # stub->real once the binary builds. The gateway routes /customer-bff/v1/quotes*
  # here (quotes passthrough).
  - { name: pricing-promo,     port: 8107, mode: stub, contract: contracts/openapi/pricing-promo.v1.yaml,     real_cmd: "bash tools/pricing-realcmd.sh" }
  # dispatch is the V-T12 slice (D13 zone-owned batch matching): real_cmd boots the
  # built binary (tools/dispatch-realcmd.sh, dispatch_batch on; ORDER_URL->order slot
  # so an accepted offer drives the saga, MAP_SIM_URL->map-sim for ETAs). `make
  # e2e-sync` promotes it stub->real once the binary builds. The gateway routes
  # /dispatch/v1/* directly and passes /driver-bff/v1/driver/offers* here (offer/accept).
  - { name: dispatch,          port: 8108, mode: stub, contract: contracts/openapi/dispatch.v1.yaml,          real_cmd: "bash tools/dispatch-realcmd.sh" }
  - { name: location-tracking, port: 8109, mode: stub, contract: contracts/openapi/location-tracking.v1.yaml, real_cmd: "" }
  - { name: notification,      port: 8110, mode: stub, contract: contracts/openapi/notification.v1.yaml,      real_cmd: "" }
  - { name: rating,            port: 8111, mode: stub, contract: contracts/openapi/rating.v1.yaml,            real_cmd: "" }
  - { name: settlement,        port: 8112, mode: stub, contract: contracts/openapi/settlement.v1.yaml,        real_cmd: "" }
  # identity-profile is the V-T2 PII slice: real_cmd boots the built binary
  # (tools/identity-profile-realcmd.sh). `make e2e-sync` promotes it stub->real.
  - { name: identity-profile,  port: 8113, mode: stub, contract: contracts/openapi/identity-profile.v1.yaml,  real_cmd: "bash tools/identity-profile-realcmd.sh" }
  # --- 4 BFFs (01 §2) ---
  - { name: customer-bff,      port: 8121, mode: stub, contract: contracts/openapi/customer-bff.v1.yaml,      real_cmd: "" }
  - { name: merchant-bff,      port: 8122, mode: stub, contract: contracts/openapi/merchant-bff.v1.yaml,      real_cmd: "" }
  - { name: driver-bff,        port: 8123, mode: stub, contract: contracts/openapi/driver-bff.v1.yaml,        real_cmd: "" }
  - { name: admin-bff,         port: 8124, mode: stub, contract: contracts/openapi/admin-bff.v1.yaml,         real_cmd: "" }
  # --- 3 S-T7 fakes (03 §5): where a catalog service delegates to a provider sim ---
  - { name: payment-sim,       port: 8091, mode: fake, contract: contracts/openapi/payment-sim.v1.yaml,       real_cmd: "" }
  - { name: map-sim,           port: 8092, mode: fake, contract: contracts/openapi/map-sim.v1.yaml,           real_cmd: "" }
  - { name: notify-sink,       port: 8093, mode: fake, contract: contracts/openapi/notify-sink.v1.yaml,       real_cmd: "" }
