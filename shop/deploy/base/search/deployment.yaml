apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-query
  labels:
    app: search-query
    shop.io/team: discovery
spec:
  replicas: 3
  selector:
    matchLabels:
      app: search-query
  template:
    metadata:
      labels:
        app: search-query
        shop.io/team: discovery
    spec:
      containers:
        - name: search-query
          image: shop/search-query:latest
          ports:
            - containerPort: 8103
          env:
            - name: PORT
              value: "8103"
            - name: SERVICE_NAME
              value: "search-query"
            - name: ENV
              value: "prod"
            - name: REGION
              value: "bkk"
            # OpenSearch endpoint the query tier reads (per-cell, index-per-country).
            - name: OPENSEARCH_URL
              value: "http://search-opensearch-data:9200"
            # search_v2 ships dark (04 §1.3 / 03 §5); staging/preview flip it on,
            # prod via a canary-gated rollout.
            - name: FLAG_SEARCH_V2
              value: "false"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8103
            initialDelaySeconds: 1
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8103
            initialDelaySeconds: 2
            periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-indexer
  labels:
    app: search-indexer
    shop.io/team: discovery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: search-indexer
  template:
    metadata:
      labels:
        app: search-indexer
        shop.io/team: discovery
    spec:
      containers:
        - name: search-indexer
          image: shop/search-indexer:latest
          ports:
            - containerPort: 8114
          env:
            - name: PORT
              value: "8114"
            - name: SERVICE_NAME
              value: "search-indexer"
            - name: ENV
              value: "prod"
            - name: REGION
              value: "bkk"
            # The indexer bulk-writes to the DEDICATED OpenSearch ingest nodes
            # (D17 backpressure), never the data/query nodes.
            - name: OPENSEARCH_INGEST_URL
              value: "http://search-opensearch-ingest:9200"
            - name: FLAG_SEARCH_V2
              value: "false"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8114
            initialDelaySeconds: 1
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8114
            initialDelaySeconds: 2
            periodSeconds: 10
