apiVersion: v1
kind: Service
metadata:
  name: search-query
  labels:
    app: search-query
    shop.io/team: discovery
spec:
  selector:
    app: search-query
  ports:
    - name: http
      port: 8103
      targetPort: 8103
---
apiVersion: v1
kind: Service
metadata:
  name: search-indexer
  labels:
    app: search-indexer
    shop.io/team: discovery
spec:
  selector:
    app: search-indexer
  ports:
    - name: http
      port: 8114
      targetPort: 8114
