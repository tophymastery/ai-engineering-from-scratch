apiVersion: apps/v1
kind: Deployment
metadata:
  name: feed-cache
  labels:
    app: feed-cache
    shop.io/team: discovery
  annotations:
    # CDN-fronting (D17 "geo-tile feed cache … CDN-fronted"): the browse feed is
    # fronted by the edge CDN, which honours the stale-while-revalidate directives
    # feed-cache emits so a cold POP serves stale while it revalidates from this
    # origin. The CDN config is render-only here (no live CDN in-sandbox); these
    # annotations are the source the edge/ingress controller templates from.
    shop.io/cdn-front: "true"
    shop.io/cdn-cache-control: "public, max-age=30, stale-while-revalidate=300, stale-if-error=600"
    shop.io/cdn-vary: "lat, lng"
    shop.io/cdn-surrogate-key: "geo-tile-feed"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: feed-cache
  template:
    metadata:
      labels:
        app: feed-cache
        shop.io/team: discovery
    spec:
      containers:
        - name: feed-cache
          image: shop/feed-cache:latest
          ports:
            - containerPort: 8116
          env:
            - name: PORT
              value: "8116"
            - name: SERVICE_NAME
              value: "feed-cache"
            - name: ENV
              value: "prod"
            - name: REGION
              value: "bkk"
            # D17 two-phase: the feed origin is the ranking browse feed (ranking
            # re-ranks the search top-500). D11: the merchant-page origin is the
            # per-cell merchant-catalog Service.
            - name: ORIGIN_FEED_URL
              value: "http://ranking:8115"
            - name: ORIGIN_MERCHANT_URL
              value: "http://merchant-catalog:8102"
            # Two-tier TTLs (D11): in-process singleflight 1s over Redis 10s.
            - name: MERCHANT_L1_TTL
              value: "1s"
            - name: MERCHANT_L2_TTL
              value: "10s"
            # Geo-tile feed SWR windows (D17): fresh 30s + 5m stale-serve band.
            - name: FEED_FRESH_TTL
              value: "30s"
            - name: FEED_STALE_TTL
              value: "5m"
            # feed_cache ships dark (04 §1.3 / 03 §5): OFF = transparent passthrough
            # to the origin. Staging/preview flip it on; prod is a canary-gated
            # rollout.
            - name: FLAG_FEED_CACHE
              value: "false"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8116
            initialDelaySeconds: 1
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8116
            initialDelaySeconds: 2
            periodSeconds: 10
