# Kustomize base for the V-T7 cart slice. Its own base dir alongside the S-T1
# placeholder/gateway base and the other slice bases (identity-profile,
# merchant-catalog, feed-cache, ...). Ships the Deployment + Service. Rendered +
# YAML-validated by `make render-cart` (mirrors `make render-catalog`).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

labels:
  - pairs:
      app.kubernetes.io/part-of: shop
    includeSelectors: false

resources:
  - deployment.yaml
  - service.yaml
