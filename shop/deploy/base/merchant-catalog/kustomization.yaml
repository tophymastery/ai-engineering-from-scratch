# Kustomize base for the V-T3 merchant-catalog slice. Its own base dir alongside
# the S-T1 placeholder/gateway base and the V-T2 identity-profile base (per
# deploy/base/kustomization.yaml: "Real services add their own base dirs
# alongside these"). Ships the Deployment + Service. Rendered + YAML-validated by
# `make render-catalog` (mirrors `make render-profile`).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

labels:
  - pairs:
      app.kubernetes.io/part-of: shop
    includeSelectors: false

resources:
  - deployment.yaml
  - service.yaml
