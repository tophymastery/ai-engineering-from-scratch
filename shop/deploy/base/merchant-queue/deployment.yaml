apiVersion: apps/v1
kind: Deployment
metadata:
  name: merchant-queue
  labels:
    app: merchant-queue
    shop.io/team: marketplace
spec:
  replicas: 3
  selector:
    matchLabels:
      app: merchant-queue
  template:
    metadata:
      labels:
        app: merchant-queue
        shop.io/team: marketplace
    spec:
      containers:
        - name: merchant-queue
          image: shop/merchant-queue:latest
          ports:
            - containerPort: 8117
          env:
            - name: PORT
              value: "8117"
            - name: SERVICE_NAME
              value: "merchant-queue"
            - name: ENV
              value: "prod"
            - name: REGION
              value: "bkk"
            # merchant_queue_v1 ships dark (04 §1.3 / 03 §5). Staging/preview
            # overlays flip it on; prod is enabled via a canary-gated rollout.
            - name: FLAG_MERCHANT_QUEUE_V1
              value: "false"
            # Order slot: an admitted accept drives the saga (POST /v1/orders/{id}:accept
            # → order.accepted). The order->merchant-queue read model is fed the
            # other way, off order.* events via the CDC inbox.
            - name: ORDER_URL
              value: "http://order:8105"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8117
            initialDelaySeconds: 1
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8117
            initialDelaySeconds: 2
            periodSeconds: 10
