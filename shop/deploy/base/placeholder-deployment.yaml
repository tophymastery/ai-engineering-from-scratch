apiVersion: apps/v1
kind: Deployment
metadata:
  name: placeholder
  labels:
    app: placeholder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: placeholder
  template:
    metadata:
      labels:
        app: placeholder
    spec:
      containers:
        - name: placeholder
          image: shop/placeholder:latest
          ports:
            - containerPort: 8081
          env:
            - name: PORT
              value: "8081"
            - name: SERVICE_NAME
              value: "placeholder"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 1
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 2
            periodSeconds: 10
