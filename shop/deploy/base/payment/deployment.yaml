apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment
  labels:
    app: payment
    shop.io/team: payments
spec:
  replicas: 3
  selector:
    matchLabels:
      app: payment
  template:
    metadata:
      labels:
        app: payment
        shop.io/team: payments
    spec:
      containers:
        - name: payment
          image: shop/payment:latest
          ports:
            - containerPort: 8106
          env:
            - name: PORT
              value: "8106"
            - name: SERVICE_NAME
              value: "payment"
            - name: ENV
              value: "prod"
            - name: REGION
              value: "bkk"
            # payment_v1 ships dark (04 §1.3 / 03 §5). Staging/preview overlays flip
            # it on; prod is enabled via a canary-gated rollout.
            - name: FLAG_PAYMENT_V1
              value: "false"
            # Downstream PSP (payment-sim in-sandbox; a real acquirer in prod).
            - name: PAYMENT_SIM_URL
              value: "http://payment-sim:8091"
            # This service's own address, where the PSP posts async webhooks.
            - name: PAYMENT_SELF_URL
              value: "http://payment:8106"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8106
            initialDelaySeconds: 1
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8106
            initialDelaySeconds: 2
            periodSeconds: 10
