# Kustomize base for the V-T10 payment authorize/capture/refund slice (Payments
# team). Ships the Deployment + Service alongside the other slice bases. Rendered
# + YAML-validated by `make render-payment` (mirrors `make render-order`).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

labels:
  - pairs:
      app.kubernetes.io/part-of: shop
    includeSelectors: false

resources:
  - deployment.yaml
  - service.yaml
