apiVersion: apps/v1
kind: Deployment
metadata:
  name: ranking
  labels:
    app: ranking
    shop.io/team: discovery
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ranking
  template:
    metadata:
      labels:
        app: ranking
        shop.io/team: discovery
    spec:
      containers:
        - name: ranking
          image: shop/ranking:latest
          ports:
            - containerPort: 8115
          env:
            - name: PORT
              value: "8115"
            - name: SERVICE_NAME
              value: "ranking"
            - name: ENV
              value: "prod"
            - name: REGION
              value: "bkk"
            # D17 two-phase: ranking retrieves the top-500 from search and re-ranks
            # to the top-50. SEARCH_URL points at the per-cell search-query Service.
            - name: SEARCH_URL
              value: "http://search-query:8103"
            # ranking_ml ships dark (04 §1.3 / 03 §5): OFF = static ranking (the
            # fallback, = shed-ladder L1). Staging/preview flip it on; prod is a
            # canary-gated rollout. Auto-fallback trips it to static on a model outage.
            - name: FLAG_RANKING_ML
              value: "false"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8115
            initialDelaySeconds: 1
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8115
            initialDelaySeconds: 2
            periodSeconds: 10
