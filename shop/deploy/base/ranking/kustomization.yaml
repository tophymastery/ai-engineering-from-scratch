# Kustomize base for the V-T5 ranking slice. Its own base dir alongside the S-T1
# placeholder/gateway base and the sibling V-T3/V-T4 bases (per
# deploy/base/kustomization.yaml: "Real services add their own base dirs
# alongside these"). Ships the Deployment + Service. Rendered + YAML-validated by
# `make render-ranking` (mirrors `make render-search`).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

labels:
  - pairs:
      app.kubernetes.io/part-of: shop
    includeSelectors: false

resources:
  - deployment.yaml
  - service.yaml
