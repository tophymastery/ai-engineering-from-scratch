# ownership.yaml — service -> owning team (teams are the D28 teams named in
# TASKS.md per slice). Minimal S-T8 seed: the post-merge smoke
# (ci/post-merge-smoke.sh) reads this to name the merging team on a red smoke, and
# the FinOps slice (V-T37) later extends it into the CI-enforced ownership
# register (services, topics, dashboards, alerts, budget lines).
#
# One line per slot so it stays greppable; {team, slice} inline map per service.
services:
  # --- 12-service catalog (01 §1) ---
  identity:          { team: "Identity & Trust", slice: "V-T1"  }
  merchant-catalog:  { team: "Discovery",        slice: "V-T3"  }
  search:            { team: "Discovery",        slice: "V-T4"  }
  cart:              { team: "Marketplace",      slice: "V-T7"  }
  order:             { team: "Marketplace",      slice: "V-T9"  }
  payment:           { team: "Payments",         slice: "V-T10" }
  pricing-promo:     { team: "Growth",           slice: "V-T8"  }
  dispatch:          { team: "Logistics",        slice: "V-T12" }
  location-tracking: { team: "Location",         slice: "V-T13" }
  notification:      { team: "Growth",           slice: "V-T15" }
  rating:            { team: "Growth",           slice: "V-T17" }
  settlement:        { team: "Money Movement",   slice: "V-T19" }
  # --- 4 BFFs (01 §2) — assigned to the team that primarily drives each ---
  customer-bff:      { team: "Marketplace",      slice: "V-T9"  }
  merchant-bff:      { team: "Marketplace",      slice: "V-T11" }
  driver-bff:        { team: "Logistics",        slice: "V-T12" }
  admin-bff:         { team: "SRE/Observability", slice: "V-T30" }
  # --- platform-owned slots (S-tasks, DevEx) ---
  gateway:           { team: "DevEx",            slice: "S-T2"  }
  payment-sim:       { team: "DevEx",            slice: "S-T7"  }
  map-sim:           { team: "DevEx",            slice: "S-T7"  }
  notify-sink:       { team: "DevEx",            slice: "S-T7"  }
