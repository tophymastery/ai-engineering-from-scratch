# search.v1 — minimal S-T8 topology contract (01 §1 `search`).
# One resource (+ runtime /healthz) so the E2E env boots a stub until V-T4 merges.
# Grows additively per D30. Conventions (02 §1): /v1 paths, snake_case fields,
# the 02 §2 error envelope on every non-2xx.
openapi: 3.0.3
info:
  title: search
  version: "1.0.0"
  description: Store/dish discovery (01 §1). Minimal E2E stub surface — geo search.
servers:
  - url: https://api.shop.io
paths:
  /v1/search:
    get:
      operationId: search_stores
      summary: Search stores/dishes near a point.
      parameters:
        - { name: lat, in: query, required: true, schema: { type: number, example: 13.7563 } }
        - { name: lng, in: query, required: true, schema: { type: number, example: 100.5018 } }
        - { name: q,   in: query, required: false, schema: { type: string, example: "som tam" } }
      responses:
        "200":
          description: Search results.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Results" }
              example:
                results:
                  - { store_id: "mer_01H8XGABCDE", name: "Som Tam House", rating: 4.7, distance_m: 820 }
                next_cursor: null
        default:
          $ref: "#/components/responses/Error"
components:
  schemas:
    Hit:
      type: object
      required: [store_id, name]
      properties:
        store_id: { type: string }
        name: { type: string }
        rating: { type: number }
        distance_m: { type: integer }
    Results:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items: { $ref: "#/components/schemas/Hit" }
        next_cursor:
          type: [string, "null"]
          description: "Cursor pagination (02 §1) — null at end."
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, trace_id, retryable]
          properties:
            code: { type: string }
            message: { type: string }
            details:
              type: array
              items:
                type: object
                properties:
                  field: { type: string }
                  reason: { type: string }
            trace_id: { type: string }
            retryable: { type: boolean }
  responses:
    Error:
      description: "The 02 §2 error envelope — returned on every non-2xx."
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          example:
            error:
              code: "VALIDATION"
              message: "lat/lng are required."
              trace_id: "4bf92f3577b34da6a3ce929d0e0e4736"
              retryable: false
