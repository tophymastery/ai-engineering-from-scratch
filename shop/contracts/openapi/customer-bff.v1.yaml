# customer-bff.v1 — client-shaped BFF contract (02 §4.2). BFFs aggregate service
# calls but never invent semantics. Same conventions as services (02 §1): /v1
# paths, snake_case fields, the 02 §2 error envelope on every non-2xx.
openapi: 3.0.3
info:
  title: customer-bff
  version: "1.0.0"
  description: Customer BFF — home feed + order detail aggregation (02 §4.2).
servers:
  - url: https://api.shop.io
paths:
  /v1/customer/home:
    get:
      operationId: get_home
      summary: One payload — stores (search) + fees (pricing) + ratings.
      parameters:
        - name: lat
          in: query
          required: true
          schema: { type: number, example: 13.7563 }
        - name: lng
          in: query
          required: true
          schema: { type: number, example: 100.5018 }
      responses:
        "200":
          description: Home feed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Home" }
              example:
                stores:
                  - store_id: "mer_01H8XGABCDE"
                    name: "Som Tam House"
                    rating: 4.7
                    delivery_fee: { amount: 1900, currency: "THB" }
                    eta_minutes: 28
                next_cursor: null
        default:
          $ref: "#/components/responses/Error"
  /v1/customer/orders/{order_id}:
    get:
      operationId: get_order_detail
      summary: Aggregated order detail for the customer app.
      parameters:
        - name: order_id
          in: path
          required: true
          schema: { type: string, example: "ord_01H8XGJ2Q7Z9BQ3M4N5P6R7S8T" }
      responses:
        "200":
          description: Order detail (customer-shaped).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OrderDetail" }
              example:
                order_id: "ord_01H8XGJ2Q7Z9BQ3M4N5P6R7S8T"
                status: "ACCEPTED"
                total: { amount: 42550, currency: "THB" }
                store_name: "Som Tam House"
                eta_minutes: 24
                created_at: "2026-07-11T02:15:00Z"
        default:
          $ref: "#/components/responses/Error"

  # --- V-T1 auth passthroughs (D4). The customer app registers/logs in/refreshes
  # through the BFF. IMPLEMENTATION NOTE: the E2E BFF slot is a contract stub, so
  # today the GATEWAY routes /customer-bff/v1/auth/* DIRECTLY to identity-auth
  # (gateway/main.go bffsWithAuthPassthrough). When a BFF slice ships richer auth
  # flows it will front identity itself; the request/response contract below is
  # the stable shape either way. Additive-only (D30).
  /v1/auth/register:
    post:
      operationId: customer_register
      summary: Register a customer account (passthrough to identity-auth).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Credentials" }
      responses:
        "201":
          description: Account created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RegisteredUser" }
              example: { user_id: "usr_01H8XGJ2Q7Z9BQ3M4N5P6R7S8T", email: "diner@example.com", role: "customer" }
        default:
          $ref: "#/components/responses/Error"
  /v1/auth/login:
    post:
      operationId: customer_login
      summary: Log in (passthrough to identity-auth) — returns an access+refresh token pair.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Credentials" }
      responses:
        "200":
          description: Token pair.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenPair" }
              example: { access_token: "eyJhbGciOiJFUzI1NiJ9...", refresh_token: "rft_...", token_type: "Bearer", expires_in: 900, expires_at: "2026-07-11T02:30:00Z", user_id: "usr_...", session_id: "ses_...", role: "customer" }
        default:
          $ref: "#/components/responses/Error"
  /v1/auth/refresh:
    post:
      operationId: customer_refresh
      summary: Rotate the refresh token (passthrough to identity-auth).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string, example: "rft_01h8xgj2q7z9bq3m4n5p6r7s8t" }
      responses:
        "200":
          description: New (rotated) token pair.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenPair" }
        default:
          $ref: "#/components/responses/Error"

  # --- V-T2 profile CRUD + erasure (D3). The customer app manages its PII and
  # exercises right-to-erasure through the BFF. IMPLEMENTATION NOTE: the gateway
  # routes /customer-bff/v1/profiles* + /v1/tokens/* DIRECTLY to identity-profile
  # (gateway/main.go bffsWithProfilePassthrough); the request/response contract
  # below is the stable shape either way. Additive-only (D30). PII is resident in
  # the owning cell (X-Cell); erasure crypto-shreds the per-user key.
  /v1/profiles:
    post:
      operationId: customer_create_profile
      summary: Create the customer's profile (passthrough to identity-profile).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProfileInput" }
      responses:
        "201":
          description: Profile created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Profile" }
              example: { user_token: "usr_01H8XGJ2Q7Z9BQ3M4N5P6R7S8T", jurisdiction: "ID", full_name: "Budi Santoso", phone: "+62-812-1111-2222", email: "budi@example.co.id", addresses: [], created_at: "2026-07-11T02:15:00Z", updated_at: "2026-07-11T02:15:00Z", erased: false }
        default:
          $ref: "#/components/responses/Error"
  /v1/profiles/{user_token}:
    get:
      operationId: customer_get_profile
      summary: Read the customer's (decrypted) profile (passthrough to identity-profile).
      parameters:
        - name: user_token
          in: path
          required: true
          schema: { type: string, example: "usr_01H8XGJ2Q7Z9BQ3M4N5P6R7S8T" }
      responses:
        "200":
          description: Profile.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Profile" }
        default:
          $ref: "#/components/responses/Error"
    put:
      operationId: customer_update_profile
      summary: Update the customer's PII (passthrough to identity-profile).
      parameters:
        - name: user_token
          in: path
          required: true
          schema: { type: string, example: "usr_01H8XGJ2Q7Z9BQ3M4N5P6R7S8T" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProfileInput" }
      responses:
        "200":
          description: Updated profile.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Profile" }
        default:
          $ref: "#/components/responses/Error"
  /v1/profiles/{user_token}:erase:
    post:
      operationId: customer_erase_profile
      summary: Right-to-erasure — crypto-shred the customer's PII (passthrough to identity-profile).
      parameters:
        - name: user_token
          in: path
          required: true
          schema: { type: string, example: "usr_01H8XGJ2Q7Z9BQ3M4N5P6R7S8T" }
      responses:
        "200":
          description: Erasure receipt.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErasureReceipt" }
              example: { user_token: "usr_01H8XGJ2Q7Z9BQ3M4N5P6R7S8T", jurisdiction: "ID", erased: true, key_destroyed: true, stores: ["primary", "backup"], erased_at: "2026-07-11T02:20:00Z", addr_tokens: [] }
        default:
          $ref: "#/components/responses/Error"
  /v1/tokens/{token}:
    get:
      operationId: customer_resolve_token
      summary: Resolve a usr_/adr_ token to its NON-PII reference (passthrough to identity-profile).
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string, example: "usr_01H8XGJ2Q7Z9BQ3M4N5P6R7S8T" }
      responses:
        "200":
          description: Token reference (no PII).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenRef" }
              example: { token: "usr_01H8XGJ2Q7Z9BQ3M4N5P6R7S8T", kind: "user", jurisdiction: "ID", erased: false, exists: true }
        default:
          $ref: "#/components/responses/Error"
components:
  schemas:
    Credentials:
      type: object
      required: [email, password]
      properties:
        email: { type: string, example: "diner@example.com" }
        password: { type: string, example: "correct horse battery staple" }
    RegisteredUser:
      type: object
      required: [user_id, email, role]
      properties:
        user_id: { type: string }
        email: { type: string }
        role: { type: string }
    TokenPair:
      type: object
      required: [access_token, refresh_token, token_type, expires_in, expires_at, user_id, session_id, role]
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        token_type: { type: string, enum: [Bearer] }
        expires_in: { type: integer }
        expires_at: { type: string }
        user_id: { type: string }
        session_id: { type: string }
        role: { type: string }
        kid: { type: string }
    AddressInput:
      type: object
      properties:
        label: { type: string, example: "home" }
        line1: { type: string, example: "Jl. Merdeka 17" }
        city: { type: string, example: "Jakarta" }
        postal: { type: string, example: "10110" }
        geo: { type: string }
    Address:
      type: object
      required: [addr_token, label]
      properties:
        addr_token: { type: string }
        label: { type: string }
        line1: { type: string }
        city: { type: string }
        postal: { type: string }
        geo: { type: string }
    ProfileInput:
      type: object
      properties:
        user_token: { type: string }
        jurisdiction: { type: string, example: "ID" }
        full_name: { type: string, example: "Budi Santoso" }
        phone: { type: string, example: "+62-812-1111-2222" }
        email: { type: string, example: "budi@example.co.id" }
        addresses:
          type: array
          items: { $ref: "#/components/schemas/AddressInput" }
    Profile:
      type: object
      required: [user_token, jurisdiction, created_at, updated_at, erased]
      properties:
        user_token: { type: string }
        jurisdiction: { type: string }
        full_name: { type: string }
        phone: { type: string }
        email: { type: string }
        addresses:
          type: array
          items: { $ref: "#/components/schemas/Address" }
        created_at: { type: string }
        updated_at: { type: string }
        erased: { type: boolean }
    ErasureReceipt:
      type: object
      required: [user_token, jurisdiction, erased, key_destroyed, stores, erased_at]
      properties:
        user_token: { type: string }
        jurisdiction: { type: string }
        erased: { type: boolean }
        key_destroyed: { type: boolean }
        stores:
          type: array
          items: { type: string }
        erased_at: { type: string }
        addr_tokens:
          type: array
          items: { type: string }
    TokenRef:
      type: object
      required: [token, kind, jurisdiction, erased, exists]
      properties:
        token: { type: string }
        kind: { type: string, enum: [user, address] }
        jurisdiction: { type: string }
        erased: { type: boolean }
        exists: { type: boolean }
    Money:
      type: object
      required: [amount, currency]
      properties:
        amount: { type: integer }
        currency: { type: string }
    Store:
      type: object
      required: [store_id, name]
      properties:
        store_id: { type: string }
        name: { type: string }
        rating: { type: number }
        delivery_fee: { $ref: "#/components/schemas/Money" }
        eta_minutes: { type: integer }
    Home:
      type: object
      required: [stores]
      properties:
        stores:
          type: array
          items: { $ref: "#/components/schemas/Store" }
        next_cursor:
          type: [string, "null"]
          description: "Cursor pagination (02 §1) — null at end."
    OrderDetail:
      type: object
      required: [order_id, status, total, created_at]
      properties:
        order_id: { type: string }
        status: { type: string }
        total: { $ref: "#/components/schemas/Money" }
        store_name: { type: string }
        eta_minutes: { type: integer }
        created_at: { type: string }
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, trace_id, retryable]
          properties:
            code: { type: string }
            message: { type: string }
            details:
              type: array
              items:
                type: object
                properties:
                  field: { type: string }
                  reason: { type: string }
            trace_id: { type: string }
            retryable: { type: boolean }
  responses:
    Error:
      description: "The 02 §2 error envelope — returned on every non-2xx."
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          example:
            error:
              code: "ORDER_NOT_FOUND"
              message: "No order ord_01H8… for this customer."
              trace_id: "4bf92f3577b34da6a3ce929d0e0e4736"
              retryable: false
