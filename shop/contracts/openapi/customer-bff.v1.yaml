# customer-bff.v1 — client-shaped BFF contract (02 §4.2). BFFs aggregate service
# calls but never invent semantics. Same conventions as services (02 §1): /v1
# paths, snake_case fields, the 02 §2 error envelope on every non-2xx.
openapi: 3.0.3
info:
  title: customer-bff
  version: "1.1.0"
  description: Customer BFF — home feed + order detail aggregation (02 §4.2).
servers:
  - url: https://api.shop.io
paths:
  /v1/customer/home:
    get:
      operationId: get_home
      summary: One payload — stores (search) + fees (pricing) + ratings.
      description: >
        Browse feed (02 §4.2). V-T4: today the GATEWAY routes
        /customer-bff/v1/customer/home + /v1/search DIRECTLY to the search-query
        slot (behind search_v2), same discover-from-route-table lifecycle as the
        auth/profile/catalog passthroughs; a real customer-bff slice will front
        the aggregation later (additive-only, D30). See contracts/openapi/search.v1.yaml.
      parameters:
        - name: lat
          in: query
          required: true
          schema: { type: number, example: 13.7563 }
        - name: lng
          in: query
          required: true
          schema: { type: number, example: 100.5018 }
      responses:
        "200":
          description: Home feed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Home" }
              example:
                stores:
                  - store_id: "mer_01H8XGABCDE"
                    name: "Som Tam House"
                    rating: 4.7
                    delivery_fee: { amount: 1900, currency: "THB" }
                    eta_minutes: 28
                next_cursor: null
        default:
          $ref: "#/components/responses/Error"
  /v1/customer/merchants/{merchant_id}:
    get:
      operationId: get_merchant_page
      summary: Customer merchant/store page — served from the feed-cache two-tier cache (V-T6).
      description: >
        The customer merchant page (02 §4.2). V-T6/D11: the GATEWAY routes
        /customer-bff/v1/customer/merchants/* to the feed-cache slot, which serves
        the page from a two-tier cache (in-process singleflight 1s over Redis 10s)
        with merchant-catalog as the origin — so a 1M-RPS merchant page costs the
        catalog ≤1 QPS. Same discover-from-route-table lifecycle as the browse
        passthrough; behind the `feed_cache` flag. See contracts/openapi/feed-cache.v1.yaml.
      parameters:
        - name: merchant_id
          in: path
          required: true
          schema: { type: string, example: "mer_01H8XGABCDE" }
      responses:
        "200":
          description: Merchant page (menu/store payload; X-Cache header carries the cache outcome).
          content:
            application/json:
              schema:
                type: object
                properties:
                  merchant_id: { type: string }
                  version: { type: integer }
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        item_id: { type: string }
                        name: { type: string }
                        available: { type: boolean }
        default:
          $ref: "#/components/responses/Error"
  # --- V-T7 cart passthroughs. The customer app adds/removes/reads its cart
  # through the BFF. IMPLEMENTATION NOTE: the E2E BFF slot is a contract stub, so
  # today the GATEWAY routes /customer-bff/v1/carts* DIRECTLY to the cart slot
  # (gateway/main.go bffsWithCartPassthrough); ETag/If-Match flow through the
  # reverse proxy untouched (02 §1 concurrency preserved). Same discover-from-
  # route-table lifecycle as the auth/profile/catalog/browse passthroughs above;
  # behind the `cart_v1` flag. Additive-only (D30). See contracts/openapi/cart.v1.yaml.
  /v1/carts/{cart_id}:
    get:
      operationId: get_cart_via_bff
      summary: Read the customer's cart (passthrough to cart) — returns the current ETag.
      parameters:
        - name: cart_id
          in: path
          required: true
          schema: { type: string, example: "crt_01H8XGJ2Q" }
      responses:
        "200":
          description: The cart (ETag header carries the current validator).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Cart" }
        default:
          $ref: "#/components/responses/Error"
  /v1/carts/{cart_id}/items:
    post:
      operationId: add_cart_item_via_bff
      summary: Add an item to the cart (passthrough to cart) — If-Match once the cart exists → 412 on stale.
      parameters:
        - name: cart_id
          in: path
          required: true
          schema: { type: string, example: "crt_01H8XGJ2Q" }
        - name: If-Match
          in: header
          required: false
          description: The cart's current ETag (02 §1); required on an existing cart, stale ⇒ 412.
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [item_id, quantity]
              properties:
                item_id: { type: string, example: "itm_01H8XG1" }
                merchant_id: { type: string, example: "mer_01H8XG" }
                quantity: { type: integer, example: 2 }
      responses:
        "200":
          description: Updated cart (new ETag header).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Cart" }
        default:
          $ref: "#/components/responses/Error"
  /v1/carts/{cart_id}/items/{item_id}:
    delete:
      operationId: remove_cart_item_via_bff
      summary: Remove a line from the cart (passthrough to cart) — If-Match required → 412 on stale.
      parameters:
        - name: cart_id
          in: path
          required: true
          schema: { type: string, example: "crt_01H8XGJ2Q" }
        - name: item_id
          in: path
          required: true
          schema: { type: string, example: "itm_01H8XG1" }
        - name: If-Match
          in: header
          required: false
          description: The cart's current ETag (02 §1); required, stale ⇒ 412.
          schema: { type: string }
      responses:
        "200":
          description: Updated cart (new ETag header).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Cart" }
        default:
          $ref: "#/components/responses/Error"

  # --- V-T8 quotes passthroughs (D10). The customer app prices its cart + checks
  # out a signed quote through the BFF. As with the cart passthroughs, today the
  # GATEWAY routes /customer-bff/v1/quotes* DIRECTLY to the pricing-promo slot
  # (gateway/main.go bffsWithQuotesPassthrough). Same discover-from-route-table
  # lifecycle; pricing_v1 is resolved inside pricing-promo. See
  # contracts/openapi/pricing-promo.v1.yaml. ---
  /v1/quotes:
    post:
      operationId: create_quote_via_bff
      summary: Price the customer's cart (passthrough to pricing-promo) — returns a signed quote (10-min TTL).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cart_id]
              properties:
                cart_id: { type: string, example: "crt_01H8XGJ2Q" }
                voucher_code: { type: string, example: "LUNCH25" }
                delivery_location:
                  type: object
                  properties:
                    lat: { type: number }
                    lng: { type: number }
      responses:
        "201":
          description: Signed quote (typed fees[]/discounts[] + total).
          content:
            application/json:
              schema: { type: object }
        default:
          $ref: "#/components/responses/Error"
  /v1/quotes/{quote_id}:checkout:
    post:
      operationId: checkout_quote_via_bff
      summary: Consume a signed quote at checkout (passthrough to pricing-promo) — tampered/expired ⇒ 422.
      parameters:
        - name: quote_id
          in: path
          required: true
          schema: { type: string, example: "qot_01H8XGJ2Q" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200":
          description: Quote verified + persisted.
          content:
            application/json:
              schema: { type: object }
        default:
          $ref: "#/components/responses/Error"
  /v1/customer/orders/{order_id}:
    get:
      operationId: get_order_detail
      summary: Aggregated order detail for the customer app.
      parameters:
        - name: order_id
          in: path
          required: true
          schema: { type: string, example: "ord_01H8XGJ2Q7Z9BQ3M4N5P6R7S8T" }
      responses:
        "200":
          description: Order detail (customer-shaped).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OrderDetail" }
              example:
                order_id: "ord_01H8XGJ2Q7Z9BQ3M4N5P6R7S8T"
                status: "ACCEPTED"
                total: { amount: 42550, currency: "THB" }
                store_name: "Som Tam House"
                eta_minutes: 24
                created_at: "2026-07-11T02:15:00Z"
        default:
          $ref: "#/components/responses/Error"

  # --- V-T1 auth passthroughs (D4). The customer app registers/logs in/refreshes
  # through the BFF. IMPLEMENTATION NOTE: the E2E BFF slot is a contract stub, so
  # today the GATEWAY routes /customer-bff/v1/auth/* DIRECTLY to identity-auth
  # (gateway/main.go bffsWithAuthPassthrough). When a BFF slice ships richer auth
  # flows it will front identity itself; the request/response contract below is
  # the stable shape either way. Additive-only (D30).
  /v1/auth/register:
    post:
      operationId: customer_register
      summary: Register a customer account (passthrough to identity-auth).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Credentials" }
      responses:
        "201":
          description: Account created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RegisteredUser" }
              example: { user_id: "usr_01H8XGJ2Q7Z9BQ3M4N5P6R7S8T", email: "diner@example.com", role: "customer" }
        default:
          $ref: "#/components/responses/Error"
  /v1/auth/login:
    post:
      operationId: customer_login
      summary: Log in (passthrough to identity-auth) — returns an access+refresh token pair.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Credentials" }
      responses:
        "200":
          description: Token pair.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenPair" }
              example: { access_token: "eyJhbGciOiJFUzI1NiJ9...", refresh_token: "rft_...", token_type: "Bearer", expires_in: 900, expires_at: "2026-07-11T02:30:00Z", user_id: "usr_...", session_id: "ses_...", role: "customer" }
        default:
          $ref: "#/components/responses/Error"
  /v1/auth/refresh:
    post:
      operationId: customer_refresh
      summary: Rotate the refresh token (passthrough to identity-auth).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string, example: "rft_01h8xgj2q7z9bq3m4n5p6r7s8t" }
      responses:
        "200":
          description: New (rotated) token pair.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenPair" }
        default:
          $ref: "#/components/responses/Error"

  # --- V-T2 profile CRUD + erasure (D3). The customer app manages its PII and
  # exercises right-to-erasure through the BFF. IMPLEMENTATION NOTE: the gateway
  # routes /customer-bff/v1/profiles* + /v1/tokens/* DIRECTLY to identity-profile
  # (gateway/main.go bffsWithProfilePassthrough); the request/response contract
  # below is the stable shape either way. Additive-only (D30). PII is resident in
  # the owning cell (X-Cell); erasure crypto-shreds the per-user key.
  /v1/profiles:
    post:
      operationId: customer_create_profile
      summary: Create the customer's profile (passthrough to identity-profile).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProfileInput" }
      responses:
        "201":
          description: Profile created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Profile" }
              example: { user_token: "usr_01H8XGJ2Q7Z9BQ3M4N5P6R7S8T", jurisdiction: "ID", full_name: "Budi Santoso", phone: "+62-812-1111-2222", email: "budi@example.co.id", addresses: [], created_at: "2026-07-11T02:15:00Z", updated_at: "2026-07-11T02:15:00Z", erased: false }
        default:
          $ref: "#/components/responses/Error"
  /v1/profiles/{user_token}:
    get:
      operationId: customer_get_profile
      summary: Read the customer's (decrypted) profile (passthrough to identity-profile).
      parameters:
        - name: user_token
          in: path
          required: true
          schema: { type: string, example: "usr_01H8XGJ2Q7Z9BQ3M4N5P6R7S8T" }
      responses:
        "200":
          description: Profile.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Profile" }
        default:
          $ref: "#/components/responses/Error"
    put:
      operationId: customer_update_profile
      summary: Update the customer's PII (passthrough to identity-profile).
      parameters:
        - name: user_token
          in: path
          required: true
          schema: { type: string, example: "usr_01H8XGJ2Q7Z9BQ3M4N5P6R7S8T" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProfileInput" }
      responses:
        "200":
          description: Updated profile.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Profile" }
        default:
          $ref: "#/components/responses/Error"
  /v1/profiles/{user_token}:erase:
    post:
      operationId: customer_erase_profile
      summary: Right-to-erasure — crypto-shred the customer's PII (passthrough to identity-profile).
      parameters:
        - name: user_token
          in: path
          required: true
          schema: { type: string, example: "usr_01H8XGJ2Q7Z9BQ3M4N5P6R7S8T" }
      responses:
        "200":
          description: Erasure receipt.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErasureReceipt" }
              example: { user_token: "usr_01H8XGJ2Q7Z9BQ3M4N5P6R7S8T", jurisdiction: "ID", erased: true, key_destroyed: true, stores: ["primary", "backup"], erased_at: "2026-07-11T02:20:00Z", addr_tokens: [] }
        default:
          $ref: "#/components/responses/Error"
  /v1/tokens/{token}:
    get:
      operationId: customer_resolve_token
      summary: Resolve a usr_/adr_ token to its NON-PII reference (passthrough to identity-profile).
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string, example: "usr_01H8XGJ2Q7Z9BQ3M4N5P6R7S8T" }
      responses:
        "200":
          description: Token reference (no PII).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenRef" }
              example: { token: "usr_01H8XGJ2Q7Z9BQ3M4N5P6R7S8T", kind: "user", jurisdiction: "ID", erased: false, exists: true }
        default:
          $ref: "#/components/responses/Error"
components:
  schemas:
    Credentials:
      type: object
      required: [email, password]
      properties:
        email: { type: string, example: "diner@example.com" }
        password: { type: string, example: "correct horse battery staple" }
    RegisteredUser:
      type: object
      required: [user_id, email, role]
      properties:
        user_id: { type: string }
        email: { type: string }
        role: { type: string }
    TokenPair:
      type: object
      required: [access_token, refresh_token, token_type, expires_in, expires_at, user_id, session_id, role]
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        token_type: { type: string, enum: [Bearer] }
        expires_in: { type: integer }
        expires_at: { type: string }
        user_id: { type: string }
        session_id: { type: string }
        role: { type: string }
        kid: { type: string }
    AddressInput:
      type: object
      properties:
        label: { type: string, example: "home" }
        line1: { type: string, example: "Jl. Merdeka 17" }
        city: { type: string, example: "Jakarta" }
        postal: { type: string, example: "10110" }
        geo: { type: string }
    Address:
      type: object
      required: [addr_token, label]
      properties:
        addr_token: { type: string }
        label: { type: string }
        line1: { type: string }
        city: { type: string }
        postal: { type: string }
        geo: { type: string }
    ProfileInput:
      type: object
      properties:
        user_token: { type: string }
        jurisdiction: { type: string, example: "ID" }
        full_name: { type: string, example: "Budi Santoso" }
        phone: { type: string, example: "+62-812-1111-2222" }
        email: { type: string, example: "budi@example.co.id" }
        addresses:
          type: array
          items: { $ref: "#/components/schemas/AddressInput" }
    Profile:
      type: object
      required: [user_token, jurisdiction, created_at, updated_at, erased]
      properties:
        user_token: { type: string }
        jurisdiction: { type: string }
        full_name: { type: string }
        phone: { type: string }
        email: { type: string }
        addresses:
          type: array
          items: { $ref: "#/components/schemas/Address" }
        created_at: { type: string }
        updated_at: { type: string }
        erased: { type: boolean }
    ErasureReceipt:
      type: object
      required: [user_token, jurisdiction, erased, key_destroyed, stores, erased_at]
      properties:
        user_token: { type: string }
        jurisdiction: { type: string }
        erased: { type: boolean }
        key_destroyed: { type: boolean }
        stores:
          type: array
          items: { type: string }
        erased_at: { type: string }
        addr_tokens:
          type: array
          items: { type: string }
    TokenRef:
      type: object
      required: [token, kind, jurisdiction, erased, exists]
      properties:
        token: { type: string }
        kind: { type: string, enum: [user, address] }
        jurisdiction: { type: string }
        erased: { type: boolean }
        exists: { type: boolean }
    Money:
      type: object
      required: [amount, currency]
      properties:
        amount: { type: integer }
        currency: { type: string }
    Store:
      type: object
      required: [store_id, name]
      properties:
        store_id: { type: string }
        name: { type: string }
        rating: { type: number }
        delivery_fee: { $ref: "#/components/schemas/Money" }
        eta_minutes: { type: integer }
    Home:
      type: object
      required: [stores]
      properties:
        stores:
          type: array
          items: { $ref: "#/components/schemas/Store" }
        next_cursor:
          type: [string, "null"]
          description: "Cursor pagination (02 §1) — null at end."
    OrderDetail:
      type: object
      required: [order_id, status, total, created_at]
      properties:
        order_id: { type: string }
        status: { type: string }
        total: { $ref: "#/components/schemas/Money" }
        store_name: { type: string }
        eta_minutes: { type: integer }
        created_at: { type: string }
    CartItem:
      type: object
      required: [item_id, quantity]
      properties:
        item_id: { type: string }
        merchant_id: { type: string }
        name: { type: string }
        unit_price: { $ref: "#/components/schemas/Money" }
        quantity: { type: integer }
        available: { type: boolean }
        line_total: { $ref: "#/components/schemas/Money" }
        menu_version: { type: integer }
    Cart:
      type: object
      required: [cart_id, items]
      properties:
        cart_id: { type: string }
        version: { type: integer }
        etag: { type: string }
        currency: { type: string }
        items:
          type: array
          items: { $ref: "#/components/schemas/CartItem" }
        subtotal: { $ref: "#/components/schemas/Money" }
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, trace_id, retryable]
          properties:
            code: { type: string }
            message: { type: string }
            details:
              type: array
              items:
                type: object
                properties:
                  field: { type: string }
                  reason: { type: string }
            trace_id: { type: string }
            retryable: { type: boolean }
  responses:
    Error:
      description: "The 02 §2 error envelope — returned on every non-2xx."
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          example:
            error:
              code: "ORDER_NOT_FOUND"
              message: "No order ord_01H8… for this customer."
              trace_id: "4bf92f3577b34da6a3ce929d0e0e4736"
              retryable: false
