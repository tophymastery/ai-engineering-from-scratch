# payment.v1 — the shop-internal authorize/capture/refund surface the order saga
# + BFFs call (01 §1 `payment`). The real payment service (V-T10) delegates to a
# PSP adapter (the payment-sim fake in-sandbox, a real acquirer in prod) and
# publishes payment.* events keyed region:order_id. Grows additively per D30:
# v1.1.0 adds :capture, :refund, GET, and the wallet surface (v1.0.0 shipped only
# authorize as the S-T8 topology stub). Conventions (02 §1): /v1 paths,
# snake_case, integer minor-unit Money, Idempotency-Key on every money mutation
# (D9), error envelope on every non-2xx.
openapi: 3.0.3
info:
  title: payment
  version: "1.1.0"
  description: Authorize/capture/refund + wallet via PSP adapters (01 §1, V-T10). D9 idempotency on every money mutation.
servers:
  - url: https://api.shop.io
paths:
  /v1/payments:authorize:
    post:
      operationId: authorize_payment
      summary: Authorize a payment for an order (delegates to the PSP; :action verb).
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [order_id, amount]
              properties:
                order_id: { type: string, example: "ord_01H8XGJ2Q7Z9BQ3M4N5P6R7S8T" }
                customer_id: { type: string, example: "usr_01H8XGK5V" }
                payment_method_id: { type: string, example: "pm_01H8XGK5V" }
                method: { type: string, enum: [card, wallet], example: "card" }
                amount: { $ref: "#/components/schemas/Money" }
      responses:
        "201":
          description: Payment authorized.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Payment" }
              example:
                payment_id: "pay_01H8XGK5V7Z9BQ3M4N5P6R7S8T"
                order_id: "ord_01H8XGJ2Q7Z9BQ3M4N5P6R7S8T"
                status: "AUTHORIZED"
                amount: { amount: 42550, currency: "THB" }
                authorized_at: "2026-07-11T02:15:00Z"
        default:
          $ref: "#/components/responses/Error"
  /v1/payments/{payment_id}:capture:
    post:
      operationId: capture_payment
      summary: Capture an authorized payment (idempotent money mutation, D9).
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - name: payment_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Payment captured (or an idempotent replay of a prior capture).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Payment" }
        default:
          $ref: "#/components/responses/Error"
  /v1/payments/{payment_id}:refund:
    post:
      operationId: refund_payment
      summary: Refund a captured payment (idempotent money mutation, D9).
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - name: payment_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Payment refunded (or an idempotent replay of a prior refund).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Payment" }
        default:
          $ref: "#/components/responses/Error"
  /v1/payments/{payment_id}:
    get:
      operationId: get_payment
      summary: Payment detail + current status.
      parameters:
        - name: payment_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: The payment.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Payment" }
        default:
          $ref: "#/components/responses/Error"
  /v1/wallet:credit:
    post:
      operationId: credit_wallet
      summary: Top up a stored-value wallet (idempotent, D9).
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customer_id, amount]
              properties:
                customer_id: { type: string }
                amount: { $ref: "#/components/schemas/Money" }
      responses:
        "200":
          description: Wallet credited.
          content:
            application/json:
              schema:
                type: object
                properties:
                  customer_id: { type: string }
                  credited: { $ref: "#/components/schemas/Money" }
        default:
          $ref: "#/components/responses/Error"
  /v1/wallet/{customer_id}:
    get:
      operationId: get_wallet_balance
      summary: Wallet balance for a customer.
      parameters:
        - name: customer_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: The wallet balance.
          content:
            application/json:
              schema:
                type: object
                properties:
                  customer_id: { type: string }
                  balance: { $ref: "#/components/schemas/Money" }
        default:
          $ref: "#/components/responses/Error"
components:
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Client-generated ULID/UUID (02 §3). Required on every money mutation (D9).
      schema: { type: string }
  schemas:
    Money:
      type: object
      required: [amount, currency]
      properties:
        amount: { type: integer }
        currency: { type: string }
    Payment:
      type: object
      required: [payment_id, order_id, status, amount, authorized_at]
      properties:
        payment_id: { type: string }
        order_id: { type: string }
        status: { type: string, enum: [AUTHORIZED, CAPTURED, REFUNDED, VOIDED, DECLINED, FAILED] }
        amount: { $ref: "#/components/schemas/Money" }
        authorized_at: { type: string }
        capture_id: { type: string }
        refund_id: { type: string }
        method: { type: string }
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, trace_id, retryable]
          properties:
            code: { type: string }
            message: { type: string }
            details:
              type: array
              items:
                type: object
                properties:
                  field: { type: string }
                  reason: { type: string }
            trace_id: { type: string }
            retryable: { type: boolean }
  responses:
    Error:
      description: "The 02 §2 error envelope — returned on every non-2xx (declines map from the PSP)."
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          example:
            error:
              code: "PAYMENT_DECLINED"
              message: "The issuer declined the card."
              trace_id: "4bf92f3577b34da6a3ce929d0e0e4736"
              retryable: false
