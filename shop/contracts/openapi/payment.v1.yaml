# payment.v1 — minimal S-T8 topology contract (01 §1 `payment`).
# One resource (+ runtime /healthz) so the E2E env boots a stub until V-T10 merges.
# The real payment service delegates to the payment-sim fake (PSP side); this
# contract is the shop-internal authorize surface the order saga calls. Grows
# additively per D30. Conventions (02 §1): /v1 paths, snake_case, error envelope.
openapi: 3.0.3
info:
  title: payment
  version: "1.0.0"
  description: Authorize/capture/refund via PSP adapters (01 §1). Minimal E2E stub — authorize.
servers:
  - url: https://api.shop.io
paths:
  /v1/payments:authorize:
    post:
      operationId: authorize_payment
      summary: Authorize a payment for an order (delegates to the PSP; :action verb).
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [order_id, payment_method_id, amount]
              properties:
                order_id: { type: string, example: "ord_01H8XGJ2Q7Z9BQ3M4N5P6R7S8T" }
                payment_method_id: { type: string, example: "pm_01H8XGK5V" }
                amount: { $ref: "#/components/schemas/Money" }
      responses:
        "201":
          description: Payment authorized.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Payment" }
              example:
                payment_id: "pay_01H8XGK5V7Z9BQ3M4N5P6R7S8T"
                order_id: "ord_01H8XGJ2Q7Z9BQ3M4N5P6R7S8T"
                status: "AUTHORIZED"
                amount: { amount: 42550, currency: "THB" }
                authorized_at: "2026-07-11T02:15:00Z"
        default:
          $ref: "#/components/responses/Error"
components:
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Client-generated ULID/UUID (02 §3). Required on every money mutation (D9).
      schema: { type: string }
  schemas:
    Money:
      type: object
      required: [amount, currency]
      properties:
        amount: { type: integer }
        currency: { type: string }
    Payment:
      type: object
      required: [payment_id, order_id, status, amount, authorized_at]
      properties:
        payment_id: { type: string }
        order_id: { type: string }
        status: { type: string, enum: [AUTHORIZED, CAPTURED, REFUNDED, FAILED] }
        amount: { $ref: "#/components/schemas/Money" }
        authorized_at: { type: string }
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, trace_id, retryable]
          properties:
            code: { type: string }
            message: { type: string }
            details:
              type: array
              items:
                type: object
                properties:
                  field: { type: string }
                  reason: { type: string }
            trace_id: { type: string }
            retryable: { type: boolean }
  responses:
    Error:
      description: "The 02 §2 error envelope — returned on every non-2xx (declines map from the PSP)."
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          example:
            error:
              code: "PAYMENT_DECLINED"
              message: "The issuer declined the card."
              trace_id: "4bf92f3577b34da6a3ce929d0e0e4736"
              retryable: false
