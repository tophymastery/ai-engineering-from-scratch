# order.v1 — the order service public contract (02 §4.1 core order-flow).
# Single source of truth: slices stub against this (tools/stubgen) and the Pact
# broker verifies providers against consumer expectations derived from it.
# Conventions (02 §1): /v1 paths, snake_case fields, prefixed ULIDs, integer
# minor-unit money, RFC 3339 UTC _at fields, Idempotency-Key on every mutation,
# and the 02 §2 error envelope on EVERY non-2xx.
openapi: 3.0.3
info:
  title: order
  version: "1.0.0"
  description: Order service — checkout, order detail, cancel, capture (02 §4.1).
servers:
  - url: https://api.shop.io
paths:
  /v1/quotes:
    post:
      operationId: create_quote
      summary: Price a cart (items, fees, surge, promos) — returns a quote (10 min TTL).
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cart_id]
              properties:
                cart_id: { type: string, example: "crt_01H8XGJ2Q" }
                voucher_code: { type: string, example: "LUNCH25" }
                delivery_location:
                  type: object
                  properties:
                    lat: { type: number, example: 13.7563 }
                    lng: { type: number, example: 100.5018 }
      responses:
        "201":
          description: Quote created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Quote" }
              example:
                quote_id: "qot_01H8XGJ2Q7Z9BQ3M4N5P6R7S8T"
                total: { amount: 42550, currency: "THB" }
                fees:
                  - { type: "DELIVERY", amount: 1900, currency: "THB" }
                discounts:
                  - { type: "VOUCHER", amount: -2500, currency: "THB" }
                expires_at: "2026-07-11T02:25:00Z"
        default:
          $ref: "#/components/responses/Error"
  /v1/orders:
    post:
      operationId: create_order
      summary: Checkout — returns an order in PAYMENT_PENDING. Requires Idempotency-Key.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [quote_id, payment_method_id]
              properties:
                quote_id: { type: string, example: "qot_01H8XGJ2Q7Z9BQ3M4N5P6R7S8T" }
                payment_method_id: { type: string, example: "pm_01H8XGK5V" }
                scheduled_at:
                  type: string
                  description: "Optional (02 §5 scheduled orders) — additive, no shape change."
                  example: "2026-07-11T11:30:00Z"
      responses:
        "201":
          description: Order created in PAYMENT_PENDING.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Order" }
              example:
                order_id: "ord_01H8XGJ2Q7Z9BQ3M4N5P6R7S8T"
                status: "PAYMENT_PENDING"
                total: { amount: 42550, currency: "THB" }
                created_at: "2026-07-11T02:15:00Z"
        default:
          $ref: "#/components/responses/Error"
  /v1/orders/{order_id}:
    get:
      operationId: get_order
      summary: Order detail + current state (ETag, field masks).
      parameters:
        - $ref: "#/components/parameters/OrderId"
        - name: fields
          in: query
          required: false
          schema: { type: string }
          description: "Field mask, e.g. order_id,status,eta."
      responses:
        "200":
          description: Order detail.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Order" }
              example:
                order_id: "ord_01H8XGJ2Q7Z9BQ3M4N5P6R7S8T"
                status: "ACCEPTED"
                total: { amount: 42550, currency: "THB" }
                created_at: "2026-07-11T02:15:00Z"
        default:
          $ref: "#/components/responses/Error"
  /v1/orders/{order_id}:cancel:
    post:
      operationId: cancel_order
      summary: Cancel (customer/merchant/ops). :action verb pattern; 409 on illegal state.
      parameters:
        - $ref: "#/components/parameters/OrderId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Order cancelled.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Order" }
              example:
                order_id: "ord_01H8XGJ2Q7Z9BQ3M4N5P6R7S8T"
                status: "CANCELLED"
                total: { amount: 42550, currency: "THB" }
                created_at: "2026-07-11T02:15:00Z"
        default:
          $ref: "#/components/responses/Error"
  /v1/payments/{payment_id}:capture:
    post:
      operationId: capture_payment
      summary: Capture after delivery (saga-internal, idempotent).
      parameters:
        - name: payment_id
          in: path
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Payment captured.
          content:
            application/json:
              schema:
                type: object
                properties:
                  payment_id: { type: string }
                  status: { type: string }
                  captured_at: { type: string }
              example:
                payment_id: "pay_01H8XGK5V7Z9BQ3M4N5P6R7S8T"
                status: "CAPTURED"
                captured_at: "2026-07-11T02:55:00Z"
        default:
          $ref: "#/components/responses/Error"
components:
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Client-generated ULID/UUID (02 §3). Required on every mutation.
      schema: { type: string }
    OrderId:
      name: order_id
      in: path
      required: true
      schema: { type: string, example: "ord_01H8XGJ2Q7Z9BQ3M4N5P6R7S8T" }
  schemas:
    Money:
      type: object
      required: [amount, currency]
      properties:
        amount: { type: integer, description: "Integer minor units (never floats)." }
        currency: { type: string, description: "ISO 4217, e.g. THB." }
    LineItem:
      type: object
      required: [type, amount, currency]
      properties:
        type: { type: string }
        amount: { type: integer }
        currency: { type: string }
    Quote:
      type: object
      required: [quote_id, total, expires_at]
      properties:
        quote_id: { type: string }
        total: { $ref: "#/components/schemas/Money" }
        fees:
          type: array
          items: { $ref: "#/components/schemas/LineItem" }
        discounts:
          type: array
          items: { $ref: "#/components/schemas/LineItem" }
        expires_at: { type: string }
    Order:
      type: object
      required: [order_id, status, total, created_at]
      properties:
        order_id: { type: string }
        status:
          type: string
          description: "UPPER_SNAKE closed set; clients tolerate unknown values (02 §1)."
          enum: [PAYMENT_PENDING, PAID, ACCEPTED, DISPATCHED, DELIVERED, CANCELLED]
        total: { $ref: "#/components/schemas/Money" }
        created_at: { type: string }
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, trace_id, retryable]
          properties:
            code: { type: string, description: "Stable UPPER_SNAKE from libs/errors." }
            message: { type: string }
            details:
              type: array
              items:
                type: object
                properties:
                  field: { type: string }
                  reason: { type: string }
            trace_id: { type: string }
            retryable: { type: boolean }
  responses:
    Error:
      description: "The 02 §2 error envelope — returned on EVERY non-2xx."
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          example:
            error:
              code: "ORDER_INVALID_TRANSITION"
              message: "Order ord_01H8… cannot move from DELIVERED to CANCELLED."
              details:
                - { field: "status", reason: "terminal_state" }
              trace_id: "4bf92f3577b34da6a3ce929d0e0e4736"
              retryable: false
