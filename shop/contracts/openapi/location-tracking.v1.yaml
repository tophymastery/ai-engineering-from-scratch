# location-tracking.v1 — minimal S-T8 topology contract (01 §1 `location-tracking`).
# One resource (+ runtime /healthz) so the E2E env boots a stub until V-T13 merges.
# The real service uses map-sim ETAs. Grows additively per D30. Conventions (02 §1):
# /v1 paths, snake_case, the 02 §2 error envelope on every non-2xx.
openapi: 3.0.3
info:
  title: location-tracking
  version: "1.0.0"
  description: Live driver GPS & ETA (01 §1). Minimal E2E stub — order ETA.
servers:
  - url: https://api.shop.io
paths:
  /v1/orders/{order_id}/eta:
    get:
      operationId: get_order_eta
      summary: Live ETA + last driver position for an order.
      parameters:
        - name: order_id
          in: path
          required: true
          schema: { type: string, example: "ord_01H8XGJ2Q7Z9BQ3M4N5P6R7S8T" }
      responses:
        "200":
          description: ETA snapshot.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Eta" }
              example:
                order_id: "ord_01H8XGJ2Q7Z9BQ3M4N5P6R7S8T"
                eta_minutes: 12
                driver_location: { lat: 13.7500, lng: 100.5200 }
                updated_at: "2026-07-11T02:40:00Z"
        default:
          $ref: "#/components/responses/Error"
components:
  schemas:
    Point:
      type: object
      required: [lat, lng]
      properties:
        lat: { type: number }
        lng: { type: number }
    Eta:
      type: object
      required: [order_id, eta_minutes]
      properties:
        order_id: { type: string }
        eta_minutes: { type: integer }
        driver_location: { $ref: "#/components/schemas/Point" }
        updated_at: { type: string }
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, trace_id, retryable]
          properties:
            code: { type: string }
            message: { type: string }
            details:
              type: array
              items:
                type: object
                properties:
                  field: { type: string }
                  reason: { type: string }
            trace_id: { type: string }
            retryable: { type: boolean }
  responses:
    Error:
      description: "The 02 §2 error envelope — returned on every non-2xx."
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          example:
            error:
              code: "ORDER_NOT_FOUND"
              message: "No live track for ord_01H8…."
              trace_id: "4bf92f3577b34da6a3ce929d0e0e4736"
              retryable: false
