# driver-bff.v1 — client-shaped BFF contract (01 §2, 02 §4.2). Minimal S-T8
# topology surface (+ runtime /healthz) so the E2E env boots a stub until the
# logistics slices merge. One resource (driver order-lifecycle) with the two
# driver-event :action verbs the smoke walks (pickup, deliver). Conventions
# (02 §1): /v1 paths, snake_case, the 02 §2 error envelope on every non-2xx.
openapi: 3.0.3
info:
  title: driver-bff
  version: "1.0.0"
  description: Driver BFF — offer card + trip lifecycle (01 §2). Minimal E2E stub — pickup/deliver.
servers:
  - url: https://api.shop.io
paths:
  /v1/driver/orders/{order_id}:pickup:
    post:
      operationId: driver_pickup
      summary: Driver confirms pickup — saga step 5 (DISPATCHED -> PICKED_UP). :action verb.
      parameters:
        - $ref: "#/components/parameters/OrderId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Pickup recorded.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TripEvent" }
              example:
                order_id: "ord_01H8XGJ2Q7Z9BQ3M4N5P6R7S8T"
                status: "PICKED_UP"
                at: "2026-07-11T02:45:00Z"
        default:
          $ref: "#/components/responses/Error"
  /v1/driver/orders/{order_id}:deliver:
    post:
      operationId: driver_deliver
      summary: Driver confirms delivery — saga step 5 (PICKED_UP -> DELIVERED). :action verb.
      parameters:
        - $ref: "#/components/parameters/OrderId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Delivery recorded.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TripEvent" }
              example:
                order_id: "ord_01H8XGJ2Q7Z9BQ3M4N5P6R7S8T"
                status: "DELIVERED"
                at: "2026-07-11T02:58:00Z"
        default:
          $ref: "#/components/responses/Error"

  # --- V-T1 auth passthroughs (D4). Drivers register/log in/refresh through the
  # driver BFF. Today the GATEWAY routes /driver-bff/v1/auth/* directly to
  # identity-auth (the BFF slot is a contract stub); a driver-bff slice will own
  # richer flows later. Additive-only (D30).
  /v1/auth/register:
    post:
      operationId: driver_register
      summary: Register a driver account (passthrough to identity-auth).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Credentials" }
      responses:
        "201":
          description: Account created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RegisteredUser" }
              example: { user_id: "usr_01H8XGJ2Q7Z9BQ3M4N5P6R7S8T", email: "rider@example.com", role: "driver" }
        default:
          $ref: "#/components/responses/Error"
  /v1/auth/login:
    post:
      operationId: driver_login
      summary: Log in (passthrough to identity-auth) — returns an access+refresh token pair.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Credentials" }
      responses:
        "200":
          description: Token pair.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenPair" }
        default:
          $ref: "#/components/responses/Error"
  /v1/auth/refresh:
    post:
      operationId: driver_refresh
      summary: Rotate the refresh token (passthrough to identity-auth).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string, example: "rft_01h8xgj2q7z9bq3m4n5p6r7s8t" }
      responses:
        "200":
          description: New (rotated) token pair.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenPair" }
        default:
          $ref: "#/components/responses/Error"
components:
  parameters:
    OrderId:
      name: order_id
      in: path
      required: true
      schema: { type: string, example: "ord_01H8XGJ2Q7Z9BQ3M4N5P6R7S8T" }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: Client-generated ULID/UUID (02 §3).
      schema: { type: string }
  schemas:
    Credentials:
      type: object
      required: [email, password]
      properties:
        email: { type: string, example: "rider@example.com" }
        password: { type: string, example: "correct horse battery staple" }
        role: { type: string, example: "driver" }
    RegisteredUser:
      type: object
      required: [user_id, email, role]
      properties:
        user_id: { type: string }
        email: { type: string }
        role: { type: string }
    TokenPair:
      type: object
      required: [access_token, refresh_token, token_type, expires_in, expires_at, user_id, session_id, role]
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        token_type: { type: string, enum: [Bearer] }
        expires_in: { type: integer }
        expires_at: { type: string }
        user_id: { type: string }
        session_id: { type: string }
        role: { type: string }
        kid: { type: string }
    TripEvent:
      type: object
      required: [order_id, status]
      properties:
        order_id: { type: string }
        status: { type: string, enum: [PICKED_UP, DELIVERED] }
        at: { type: string }
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, trace_id, retryable]
          properties:
            code: { type: string }
            message: { type: string }
            details:
              type: array
              items:
                type: object
                properties:
                  field: { type: string }
                  reason: { type: string }
            trace_id: { type: string }
            retryable: { type: boolean }
  responses:
    Error:
      description: "The 02 §2 error envelope — returned on every non-2xx."
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          example:
            error:
              code: "ORDER_INVALID_TRANSITION"
              message: "Order ord_01H8… is not DISPATCHED."
              trace_id: "4bf92f3577b34da6a3ce929d0e0e4736"
              retryable: false
