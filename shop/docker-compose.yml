# Canonical local-stack definition for S-T1: gateway + one placeholder service,
# both with container-native healthchecks. This is the source of truth for the
# empty stack. NOTE: in environments without a working Docker daemon, `make up`
# falls back to a process-based boot (compile & run the binaries directly) that
# mirrors this topology; see shop/VERIFICATION.md.
services:
  placeholder:
    build:
      context: ./services/_placeholder
    environment:
      PORT: "8081"
      SERVICE_NAME: "placeholder"
    healthcheck:
      # Distroless has no shell/curl; the binary answers /healthz, so we probe
      # from the gateway instead and keep this as a TCP-style readiness note.
      test: ["CMD", "/placeholder", "-healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 5
    expose:
      - "8081"

  gateway:
    build:
      context: ./gateway
    environment:
      PORT: "8080"
      PLACEHOLDER_URL: "http://placeholder:8081"
    depends_on:
      placeholder:
        condition: service_started
    healthcheck:
      test: ["CMD", "/gateway", "-healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "8080:8080"

  # --- S-T7 fake providers (03 §5) — no external side effects; boot with the
  #     stack so every slice develops and E2E-tests against them. Each answers
  #     its own /healthz via the -healthcheck binary flag (distroless: no shell).
  payment-sim:
    build:
      context: ./services/fakes/payment-sim
    environment:
      PORT: "8091"
      PSP_SEED: "42"
      PSP_TIMEOUT_MS: "200"
    healthcheck:
      test: ["CMD", "/payment-sim", "-healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 5
    expose:
      - "8091"

  map-sim:
    build:
      context: ./services/fakes/map-sim
    environment:
      PORT: "8092"
    healthcheck:
      test: ["CMD", "/map-sim", "-healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 5
    expose:
      - "8092"

  notify-sink:
    build:
      context: ./services/fakes/notify-sink
    environment:
      PORT: "8093"
    healthcheck:
      test: ["CMD", "/notify-sink", "-healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 5
    expose:
      - "8093"
